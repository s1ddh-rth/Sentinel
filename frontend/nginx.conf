server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for any unmatched route.
    # Traefik handles /api/* routing at the edge, so no proxy here.
    location / {
        try_files $uri /index.html;
        # index.html must never be cached, or browsers keep loading stale hashed-asset
        # references after a deploy. The hashed assets themselves are immutable (below).
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Vite's content-hashed assets are immutable and safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
