services:
  # ----------------------------------------------------------------------- #
  # Core demo stack (starts with `docker compose up -d`)
  # ----------------------------------------------------------------------- #
  traefik:
    image: traefik:v3.2
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - frontend
      - predict

  frontend:
    build: ./frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  predict:
    build: ./services/predict
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Trained artifacts (model.pkl, pipeline.pkl, metrics.json, fairness.json, schema.json).
      # Read-only; if the directory is empty the service falls back to the heuristic.
      - ./models:/app/models:ro
      # Training dataset (offenders.parquet) — read-only, backs the Dataset inspection page.
      # If absent the /dataset endpoint reports available=false rather than fabricating rows.
      - ./data:/app/data:ro
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - DATABASE_URL=postgresql://sentinel:sentinel@postgres:5432/sentinel
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GRAPH_SERVICE_URL=http://graph:8002
      - JWT_SECRET=${JWT_SECRET:-dev-insecure-change-me}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_EXPIRE_MINUTES=30
      - JWT_REFRESH_EXPIRE_DAYS=7
      - DEMO_PASSWORD=${DEMO_PASSWORD:-sentinel-demo-2026}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.predict.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.predict.priority=10"
      - "traefik.http.routers.predict.middlewares=strip-api"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.predict.loadbalancer.server.port=8000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------------- #
  # Extended stack — `docker compose --profile full up -d` (built tonight)
  # ----------------------------------------------------------------------- #
  agent:
    build: ./services/agent
    profiles: ["full"]
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - qdrant
      - ollama
    volumes:
      # Policy/fairness sources for retrieval (read-only).
      - ./domain_packs:/app/domain_packs:ro
    environment:
      - AGENT_LLM_PROVIDER=${AGENT_LLM_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-sentinel}
      - DOMAIN_PACK=${DOMAIN_PACK:-criminal_justice}
      - PREDICT_SERVICE_URL=http://predict:8000
      - GRAPH_SERVICE_URL=http://graph:8002
      - JWT_SECRET=${JWT_SECRET:-dev-insecure-change-me}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=PathPrefix(`/api/agent`)"
      - "traefik.http.routers.agent.priority=20"
      - "traefik.http.routers.agent.middlewares=strip-agent"
      - "traefik.http.middlewares.strip-agent.stripprefix.prefixes=/api/agent"
      - "traefik.http.services.agent.loadbalancer.server.port=8001"

  graph:
    build: ./services/graph
    profiles: ["full"]
    ports:
      - "8002:8002"
    depends_on:
      - neo4j
    environment:
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-sentinel}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.graph.rule=PathPrefix(`/api/graph`)"
      - "traefik.http.routers.graph.priority=20"
      - "traefik.http.routers.graph.middlewares=strip-graph"
      - "traefik.http.middlewares.strip-graph.stripprefix.prefixes=/api/graph"
      - "traefik.http.services.graph.loadbalancer.server.port=8002"

  neo4j:
    image: neo4j:5-community
    profiles: ["full"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sentinel}
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["full"]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    profiles: ["full"]
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"

volumes:
  pg_data:
  neo4j_data:
  qdrant_data:
  ollama_data:
  mlflow_data:
