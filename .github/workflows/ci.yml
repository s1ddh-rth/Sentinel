name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint, type, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Pin the linters: ruff's formatter and lint rules are version-sensitive, so an unpinned
      # upgrade can fail CI on code that is locally clean.
      - name: Install tooling
        run: pip install ruff==0.15.15 mypy==2.1.0
      - name: Install predict service deps
        run: pip install -r services/predict/requirements.txt pytest
      - name: Ruff lint
        run: ruff check services/ pipelines/ domain_packs/ fairness/
      - name: Ruff format check
        run: ruff format --check services/ pipelines/ domain_packs/ fairness/
      - name: Type check (predict)
        # Strict mode comes from [tool.mypy] in pyproject (strict=true) with untyped FastAPI/slowapi
        # decorators allowed; passing --strict on the CLI would override that and is wrong here.
        run: mypy services/predict/app
      - name: Unit tests
        working-directory: services/predict
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      # The deployed artifact is the built bundle, so a build failure must fail CI.
      - name: Build
        working-directory: frontend
        run: npm run build
